name: Normalize EPUB HTML

on:
  workflow_dispatch:
  push:
    paths:
      - 'tools/normalize_epub_html.py'
      - '202603/**/*.html'
      - '.github/workflows/normalize-epub-html.yml'

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize EPUB HTML
        run: python tools/normalize_epub_html.py

      - name: Commit normalized HTML
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 202603/**/*.html
          git commit -m "Normalize EPUB HTML files"
          git push
